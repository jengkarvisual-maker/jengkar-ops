<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HARI INI NGAPAIN</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #090909;
        color: #ffffff;
      }

      main {
        width: min(92vw, 420px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        padding: 24px;
        background: rgba(255, 255, 255, 0.06);
        text-align: center;
        backdrop-filter: blur(18px);
      }

      img {
        width: 104px;
        height: 104px;
        object-fit: cover;
        border-radius: 24px;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.82);
      }
    </style>
  </head>
  <body>
    <main>
      <img alt="HARI INI NGAPAIN" src="/icons/icon-192.png" />
      <h1>HARI INI NGAPAIN</h1>
      <p>Koneksi internet sedang tidak tersedia. Coba buka lagi saat jaringan sudah stabil.</p>
    </main>
  </body>
</html>
